<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ESPICE 登録フォーム</title>
</head>
<body>

<h1>動画登録フォーム</h1>

<form action="/api/add" method="POST">
  <label>タイトル：<br>
    <input type="text" name="title" required>
  </label><br><br>

  <label>メンバー：<br>
    <select name="member" required>
      <option>ネス</option>
      <option>ゾマやかじゃない！</option>
      <option>とぅーし</option>
      <option>凪</option>
      <option>KOSUKE</option>
    </select>
  </label><br><br>

  <label>日付：<br>
    <input type="date" name="date" required>
  </label><br><br>

  <label>YouTube動画ID：<br>
    <input type="text" name="video_id" required>
  </label><br><br>

  <label>説明文：<br>
    <textarea name="description" rows="5"></textarea>
  </label><br><br>

  <button type="submit">登録する</button>
</form>

</body>
</html>
