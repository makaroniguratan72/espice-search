<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESPICE SEARCH</title>

  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- サイトのスタイル -->
  <link rel="stylesheet" href="/style.css">

  <!-- Pagefind UI のスタイル -->
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  <link rel="stylesheet" href="/pagefind/pagefind-component-ui.css">

  <!-- ★ Pagefind 検索エンジン本体（UMDビルドを先に読み込む） -->
  <script src="/pagefind/pagefind.js"></script>

  <!-- Pagefind をモジュールとして読み込んで初期化（import.meta 対応） -->
  <script type="module">
    (async () => {
      try {
        // まず UMD でグローバルに pagefind が提供されているか確認
        if (window.pagefind && typeof window.pagefind.search === 'function') {
          console.log('Pagefind initialized (UMD global)');
          // もし UI モジュールが必要なら読み込む（モジュール版 UI を使う場合）
          try {
            const mod = await import('/pagefind/pagefind-ui.js');
            const PagefindUI = mod.default || mod.PagefindUI || window.PagefindUI;
            if (PagefindUI) {
              if (typeof PagefindUI === 'function') {
                const uiInstance = new PagefindUI({ element: '#searchResults', showSubResults: true, basePath: '/pagefind/' });
                if (uiInstance && typeof uiInstance.then === 'function') await uiInstance;
              } else if (PagefindUI && typeof PagefindUI.init === 'function') {
                await PagefindUI.init({ element: '#searchResults', showSubResults: true, basePath: '/pagefind/' });
              }
            }
          } catch (uiErr) {
            console.warn('Pagefind UI module import failed, but core is available:', uiErr);
          }
          return;
        }

        // UMD が無ければモジュール版 UI を import して初期化を試みる
        const mod = await import('/pagefind/pagefind-ui.js');
        const PagefindUI = mod.default || mod.PagefindUI || window.PagefindUI;

        if (!PagefindUI) {
          console.warn('PagefindUI module export not found; falling back to global if present.');
        }

        let uiInstance = null;
        if (typeof PagefindUI === 'function') {
          uiInstance = new PagefindUI({ element: '#searchResults', showSubResults: true, basePath: '/pagefind/' });
          if (uiInstance && typeof uiInstance.then === 'function') {
            uiInstance = await uiInstance;
          }
        } else if (PagefindUI && typeof PagefindUI.init === 'function') {
          uiInstance = await PagefindUI.init({ element: '#searchResults', showSubResults: true, basePath: '/pagefind/' });
        } else {
          uiInstance = window.pagefind || null;
        }

        if (uiInstance) {
          window.pagefind = uiInstance;
          console.log('Pagefind initialized (module)');
        } else {
          console.warn('Pagefind initialization returned no instance.');
        }
      } catch (err) {
        console.error('Pagefind module init failed:', err);
      }
    })();
  </script>

</head>

<body>
<header class="site-header">
  <div class="header-left">ESPICE SEARCH</div>
  <div class="header-right">
    <a href="/" class="wiki-link">検索ページに戻る</a>
  </div>
</header>
<hr class="header-line">

<main>
  <section class="search-area">
    <input type="text" id="searchInput" placeholder="動画を検索…" autocomplete="off">

    <div class="member-select">
      <label><input type="checkbox" value="ネス"> ネス</label>
      <label><input type="checkbox" value="ゾマ"> ゾマ</label>
      <label><input type="checkbox" value="とぅーし"> とぅーし</label>
      <label><input type="checkbox" value="凪"> 凪</label>
      <label><input type="checkbox" value="KOSUKE"> KOSUKE</label>
    </div>

    <div class="sort-tabs">
      <button id="sortNew" class="tab active">新着順</button>
      <button id="sortPopular" class="tab">人気順</button>
    </div>
  </section>

  <section id="searchResults" class="results">
    <!-- 検索結果がここに入る -->
  </section>
</main>

<!-- アプリのロジック -->
<script src="/script.js"></script>
</body>
</html>
