<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESPICE 踊ってみた検索</title>

  <link href="pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="pagefind/pagefind-ui.js"></script>

  <style>
    body {
      margin: 0;
      background: #f4f4f4;
      font-family: "Noto Sans JP", sans-serif;
    }

    /* 黒ヘッダー */
    header {
      background: #000;
      color: #fff;
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
    }

    /* コンテンツ幅 */
    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 16px;
    }

    /* セクションタイトル */
    .section-title {
      font-size: 22px;
      font-weight: bold;
      border-left: 6px solid #ff4b4b;
      padding-left: 10px;
      margin-bottom: 20px;
    }

    /* フィルタボックス */
    .filter-box {
      margin-bottom: 20px;
      background: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .filter-box label {
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ソートボタン */
    .sort-box {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .sort-box button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #ddd;
      cursor: pointer;
      font-size: 14px;
    }

    /* Pagefind 検索ボックス */
    .pagefind-ui__search-input {
      font-size: 16px !important;
      padding: 14px !important;
      border-radius: 10px !important;
    }

    /* 検索結果カード */
    .pagefind-ui__result {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* サムネイル */
    .thumb {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    /* メンバー色タグ（ESPICE公式カラー） */
    .members {
      font-weight: bold;
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .members span {
      padding: 6px 10px;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }
    .nes { background: #9e9e9e; }        /* グレー */
    .zoma { background: #ff9800; }       /* オレンジ */
    .two { background: #4fc3f7; }        /* 水色 */
    .nagi { background: #8bc34a; }       /* 黄緑 */
    .kosuke { background: #9c27b0; }     /* 紫 */

    /* スマホ専用調整 */
    @media (max-width: 600px) {
      header h1 {
        font-size: 18px;
      }
      .section-title {
        font-size: 20px;
      }
      .pagefind-ui__result {
        padding: 16px;
      }
      body {
        font-size: 15px;
      }
    }
  </style>
</head>

<body data-pagefind-ignore>

<header>
  <h1>ESPICE 踊ってみた検索</h1>
</header>

<div class="container">
  <div class="section-title">検索</div>

  <!-- メンバー絞り込み -->
  <div class="filter-box">
    <label><input type="checkbox" value="ネス"> ネス</label>
    <label><input type="checkbox" value="ゾマ"> ゾマ</label>
    <label><input type="checkbox" value="とぅーし"> とぅーし</label>
    <label><input type="checkbox" value="凪"> 凪</label>
    <label><input type="checkbox" value="KOSUKE"> KOSUKE</label>
  </div>

  <!-- 日付ソート -->
  <div class="sort-box">
    <button id="sort-new">新しい順</button>
    <button id="sort-old">古い順</button>
  </div>

  <div id="search"></div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const ui = new PagefindUI({
      element: "#search",
      showSubResults: true,
      autofocus: true
    });

    const boxes = document.querySelectorAll('.filter-box input');

    // ★ チェックボックスでフィルタ検索
    boxes.forEach(box => {
      box.addEventListener('change', () => {
        const selected = [...boxes]
          .filter(b => b.checked)
          .map(b => `member:${b.value}`);

        ui.search(selected.join(" "));
      });
    });

    // ★ 初期状態で全件表示
    ui.search("");

    // ★ 日付ソート
    const sortNew = document.getElementById("sort-new");
    const sortOld = document.getElementById("sort-old");

    sortNew.addEventListener("click", () => {
      sortResults(true);
    });

    sortOld.addEventListener("click", () => {
      sortResults(false);
    });

    function sortResults(desc) {
      const results = document.querySelectorAll(".pagefind-ui__result");

      const arr = [...results].sort((a, b) => {
        const da = new Date(a.querySelector("[data-date]").dataset.date);
        const db = new Date(b.querySelector("[data-date]").dataset.date);
        return desc ? db - da : da - db;
      });

      const container = document.querySelector("#search");
      container.innerHTML = "";
      arr.forEach(el => container.appendChild(el));
    }
  });
</script>

</body>
</html>
