<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ESPICE SEARCH</title>

  <link rel="stylesheet" href="style.css">

  <!-- Pagefind UI を ES Module として読み込む（named import） -->
  <script type="module">
  (async () => {
    // 1) まず dynamic import を試す
    try {
      const mod = await import('/pagefind/pagefind-ui.js');
      const exportNames = Object.keys(mod || {});
      console.log('pagefind module exports:', exportNames);

      // 可能性のあるエクスポート名を順にチェック
      const PagefindUI =
        mod.PagefindUI ||
        mod.Pagefind ||
        mod.default ||
        mod.createPagefindUI ||
        mod.PagefindModularUI ||
        mod.PagefindComponentUI;

      if (PagefindUI) {
        initPagefind(PagefindUI);
        return;
      }

      // export が空なら fallback に進む
      console.warn('Pagefind module did not export a usable symbol, falling back to global loader.');
    } catch (err) {
      console.warn('Dynamic import failed or returned no usable exports:', err);
    }

    // 2) fallback: グローバルスクリプトとして読み込む（UMD/IIFE 対応）
    await new Promise((resolve, reject) => {
      // 既にグローバルにあるか確認
      if (window.PagefindUI || window.Pagefind || window.PagefindComponentUI) {
        resolve();
        return;
      }

      const s = document.createElement('script');
      s.src = '/pagefind/pagefind-ui.js';
      s.async = true;
      s.onload = () => {
        // 少し待ってグローバルがセットされるのを許す
        setTimeout(() => {
          if (window.PagefindUI || window.Pagefind || window.PagefindComponentUI) {
            resolve();
          } else {
            reject(new Error('pagefind-ui.js loaded but no global Pagefind symbol found'));
          }
        }, 50);
      };
      s.onerror = () => reject(new Error('Failed to load /pagefind/pagefind-ui.js as script'));
      document.head.appendChild(s);
    }).then(() => {
      // グローバルから取り出す
      const PagefindUI =
        window.PagefindUI ||
        window.Pagefind ||
        window.PagefindComponentUI ||
        window.PagefindModularUI;
      if (!PagefindUI) {
        console.error('Fallback loaded but Pagefind UI global not found. Available globals:', Object.keys(window).filter(k => k.toLowerCase().includes('pagefind')));
        return;
      }
      initPagefind(PagefindUI);
    }).catch(err => {
      console.error('Failed to load Pagefind UI (both module and global fallback):', err);
    });

    // 初期化関数
    function initPagefind(PagefindUI) {
      try {
        const maybeInstance = new PagefindUI({
          element: '#searchResults',
          showSubResults: true,
        });
        // 一部実装は Promise を返す場合がある
        if (maybeInstance && typeof maybeInstance.then === 'function') {
          maybeInstance.then(inst => { window.pagefind = inst; console.log('Pagefind initialized (async)'); });
        } else {
          window.pagefind = maybeInstance;
          console.log('Pagefind initialized');
        }
      } catch (e) {
        console.error('Error initializing PagefindUI:', e);
      }
    }
  })();
</script>


</head>

<body>

<header class="site-header">
  <div class="header-left">ESPICE SEARCH</div>
  <div class="header-right">
    <a href="/" class="wiki-link">検索ページに戻る</a>
  </div>
</header>
<hr class="header-line">

<div class="search-area">

  <input type="text" id="searchInput" placeholder="動画を検索…">

  <div class="member-select">
    <label><input type="checkbox" value="ネス"> ネス</label>
    <label><input type="checkbox" value="ゾマ"> ゾマ</label>
    <label><input type="checkbox" value="とぅーし"> とぅーし</label>
    <label><input type="checkbox" value="凪"> 凪</label>
    <label><input type="checkbox" value="KOSUKE"> KOSUKE</label>
  </div>

  <div class="sort-tabs">
    <button id="sortNew" class="tab active">新着順</button>
    <button id="sortPopular" class="tab">人気順</button>
  </div>

</div>

<div id="searchResults" class="results"></div>

<script src="script.js"></script>

</body>
</html>
