<!DOCTYPE html>
<html lang="ja">
<head>

  <title>ESPICE 踊ってみた検索</title>

  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">

  <!-- メインCSS -->

</head>

<body>

  <div class="search-area">

      </div>

      <div class="member-select">
        <label class="member-option"><input type="checkbox" value="NES"> NES</label>
        <label class="member-option"><input type="checkbox" value="とぅーし"> とぅーし</label>
        <label class="member-option"><input type="checkbox" value="ぱんだ"> ぱんだ</label>
        <label class="member-option"><input type="checkbox" value="しらす"> しらす</label>
        <label class="member-option"><input type="checkbox" value="あおい"> あおい</label>
      </div>

    </div>
  </div>

  <div id="searchResults"></div>

  <!-- メインJS -->
  <script src="script.js"></script>

</body>
</html>
