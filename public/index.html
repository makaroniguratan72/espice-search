<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ESPICE 踊ってみた検索</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ Pagefind 2.x UI CSS -->
  <link rel="stylesheet" href="/pagefind/pagefind-modular-ui.css">

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background: #fafafa;
      color: #333;
    }

    .site-header {
      background: #000;
      color: #fff;
      padding: 12px 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .section-title {
      background: #e3f2fd;
      color: #0d47a1;
      padding: 10px 12px;
      border-radius: 8px;
      margin: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .member-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 20px;
    }

    .member-tag {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid #ccc;
    }

    .member-tag input {
      transform: scale(1.2);
    }

    .sort-buttons {
      display: flex
