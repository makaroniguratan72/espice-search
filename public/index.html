<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESPICE 踊ってみた検索</title>

  <link href="pagefind/pagefind-ui.css" rel="stylesheet">
  <script src="pagefind/pagefind-ui.js"></script>

  <style>
    body {
      margin: 0;
      background: #f4f4f4;
      font-family: "Noto Sans JP", sans-serif;
    }

    header {
      background: #000;
      color: #fff;
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 16px;
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      border-left: 6px solid #ff4b4b;
      padding-left: 10px;
      margin-bottom: 20px;
    }

    .filter-box {
      margin-bottom: 20px;
      background: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .sort-box {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .sort-box button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: #ddd;
      cursor: pointer;
      font-size: 14px;
    }
