<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ESPICE SEARCH</title>

  <!-- Pagefind UI -->
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  <script src="/pagefind/pagefind-ui.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="site-header">
    <div class="header-left">ESPICE SEARCH</div>
    <div class="header-right">
      <a href="/" class="wiki-link">検索ページに戻る</a>
    </div>
  </header>
  <hr class="header-line">

  <!-- Pagefind の検索UIを置く場所 -->
  <div id="search"></div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        showImages: false
      });
    });
  </script>

</body>
</html>
