<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESPICE SEARCH</title>

  <!-- サイトのスタイル -->
  <link rel="stylesheet" href="/style.css">

  <!-- Pagefind UI のスタイル -->
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  <link rel="stylesheet" href="/pagefind/pagefind-component-ui.css">

  <!-- ★ Pagefind 検索エンジン本体（必須） -->
  <script src="/pagefind/pagefind.js"></script>

  <!-- ★ Pagefind UI（必須） -->
  <script src="/pagefind/pagefind-ui.js"></script>

  <!-- Pagefind UI 初期化（シンプルで安定） -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      try {
        const ui = new PagefindUI({
          element: "#searchResults",
          showSubResults: true
        });

        // PagefindUI が内部で pagefind インスタンスを作る
        if (ui && typeof ui.then === "function") {
          ui.then(inst => {
            window.pagefind = inst;
            console.log("Pagefind initialized (async)");
          });
        } else {
          window.pagefind = ui;
          console.log("Pagefind initialized");
        }
      } catch (e) {
        console.error("Error initializing PagefindUI:", e);
      }
    });
  </script>
</head>

<body>
<header class="site-header">
  <div class="header-left">ESPICE SEARCH</div>
  <div class="header-right">
    <a href="/" class="wiki-link">検索ページに戻る</a>
  </div>
</header>
<hr class="header-line">

<main>
  <section class="search-area">
    <input type="text" id="searchInput" placeholder="動画を検索…" autocomplete="off">

    <div class="member-select">
      <label><input type="checkbox" value="ネス"> ネス</label>
      <label><input type="checkbox" value="ゾマ"> ゾマ</label>
      <label><input type="checkbox" value="とぅーし"> とぅーし</label>
      <label><input type="checkbox" value="凪"> 凪</label>
      <label><input type="checkbox" value="KOSUKE"> KOSUKE</label>
    </div>

    <div class="sort-tabs">
      <button id="sortNew" class="tab active">新着順</button>
      <button id="sortPopular" class="tab">人気順</button>
    </div>
  </section>

  <section id="searchResults" class="results">
    <!-- 検索結果がここに入る -->
  </section>
</main>

<!-- アプリのロジック -->
<script src="/script.js"></script>
</body>
</html>
