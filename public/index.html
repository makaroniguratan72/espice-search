<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESPICE SEARCH</title>

  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- サイトのスタイル -->
  <link rel="stylesheet" href="/style.css">
</head>

<body>
<header class="site-header">
  <div class="header-left">ESPICE SEARCH</div>
  <div class="header-right">
   <a href="https://espice.miraheze.org/wiki/メインページ" class="wiki-link">Wikiページに戻る</a>
  </div>
</header>
<hr class="header-line">

<main>
  <section class="search-area">
    <input type="text" id="searchInput" placeholder="動画を検索…" autocomplete="off">

    <div class="member-select">
      <label><input type="checkbox" value="ネス"> ネス</label>
      <label><input type="checkbox" value="ゾマやかじゃない!"> ゾマやかじゃない!</label>
      <label><input type="checkbox" value="とぅーし"> とぅーし</label>
      <label><input type="checkbox" value="凪"> 凪</label>
      <label><input type="checkbox" value="KOSUKE"> KOSUKE</label>
    </div>

   <div class="sort-tabs">
  <button id="sortNew" class="tab active">新着順</button>
  <button id="sortPopular" class="tab">人気順</button>

  <label class="mode-switch">
    <input type="radio" name="mode" value="AND" checked> AND
  </label>

  <label class="mode-switch">
    <input type="radio" name="mode" value="STRICT_AUTO"> ONLY
  </label>
</div>



  </section>

  <section id="searchResults" class="results">
    <!-- 検索結果がここに入る -->
  </section>
</main>

<!-- アプリのロジック -->
<script src="/script.js"></script>
</body>
</html>
