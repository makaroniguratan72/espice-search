<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ESPICE 踊ってみた検索</title>

<!-- Pagefind UI（2.x 用） -->
<link href="/pagefind/pagefind-modular-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-modular-ui.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f7f7f7;
  padding: 20px;
}
h1 {
  font-size: 26px;
  margin-bottom: 20px;
}
.filter-box, .sort-box {
  margin: 20px 0;
  padding: 15px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
.result-box {
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>ESPICE 踊ってみた検索</h1>

<!-- Pagefind検索UI -->
<div id="search"></div>

<!-- ====== フィルター ====== -->
<div class="filter-box">
  <h3>メンバー絞り込み</h3>
  <label><input type="checkbox" class="member-filter" value="ネス"> ネス</label><br>
  <label><input type="checkbox" class="member-filter" value="ゾマやかじゃない！"> ゾマやかじゃない！</label><br>
  <label><input type="checkbox" class="member-filter" value="とぅーし"> とぅーし</label><br>
  <label><input type="checkbox" class="member-filter" value="凪"> 凪</label><br>
  <label><input type="checkbox" class="member-filter" value="KOSUKE"> KOSUKE</label><br>
</div>

<!-- ====== ソート ====== -->
<div class="sort-box">
  <h3>ソート</h3>
  <button class="sort-btn" data-sort="date">新着順</button>
  <button class="sort-btn" data-sort="views">再生数順</button>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

  /* ===== PagefindUI 初期化（2.x） ===== */
  const ui = new PagefindUI({
    element: "#search",
    basePath: "/site"
  });

  /* ===== メンバー絞り込み ===== */
  document.querySelectorAll(".member-filter").forEach(cb => {
    cb.addEventListener("change", () => {
      const checked = [...document.querySelectorAll(".member-filter:checked")].map(x => x.value);
      if (checked.length === 0) {
        ui.clearFilters();
      } else {
        ui.setFilters([{ filter: "member", value: checked }]);
      }
    });
  });

  /* ===== ソート ===== */
  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      ui.setSort(btn.dataset.sort);
    });
  });

});
</script>

</body>
</html>
