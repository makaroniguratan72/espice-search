<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>ESPICE Search</title>

    <!-- Pagefind 1.x UIпјҲзө¶еҜҫгғ‘гӮ№пјү -->
    <script src="/pagefind/pagefind-ui.js"></script>
    <link href="/pagefind/pagefind-ui.css" rel="stylesheet">

    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 16px;
        background: #fafafa;
      }

      h1 {
        margin-bottom: 12px;
      }

      #search {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 16px;
      }

      .result-card {
        background: #fff;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 14px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        cursor: pointer;
      }

      .title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 6px;
      }

      .excerpt {
        font-size: 13px;
        color: #666;
      }

      .add-link {
        margin-top: 40px;
        text-align: center;
      }
      .add-link a {
        color: #666;
        font-size: 14px;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <h1>ESPICE иёҠгҒЈгҒҰгҒҝгҒҹжӨңзҙў</h1>

    <input id="search" placeholder="жӨңзҙўвҖҰ" />

    <div id="results"></div>

    <div class="add-link">
      <a href="add.html">еӢ•з”»гӮ’зҷ»йҢІгҒҷгӮӢ</a>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        const ui = new PagefindUI({
          element: "#results",
          basePath: "/pagefind"
        });

        document.querySelector("#search").addEventListener("input", (e) => {
          ui.search(e.target.value);
        });

        ui.search("");
      });
    </script>
  </body>
</html>
