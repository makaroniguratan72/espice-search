<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ESPICE 踊ってみた検索</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Pagefind UI（検索フォーム復活） -->
  <link rel="stylesheet" href="/pagefind/pagefind-component-ui.css">
  <script type="module">
    import { PagefindUI } from "/pagefind/pagefind-component-ui.js";
    new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: true
    });
  </script>

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background: #fafafa;
      color: #333;
    }

    /* 黒ヘッダー */
    .site-header {
      background: #000;
      color: #fff;
      padding: 12px 20px;
      font-size: 20px;
      font-weight: bold;
    }

    /* 青帯タイトル */
    .section-title {
      background: #e3f2fd;
      color: #0d47a1;
      padding: 10px 12px;
      border-radius: 8px;
      margin: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    /* メンバー色タグ */
    .member-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 20px;
    }

    .member-tag {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #000;
    }

    .member-tag input {
      transform: scale(1.2);
    }

    .nes { background: #f2f2f2; }
    .zoma { background: #ff8a00; color: #fff; }
    .toshi { background: #4fc3f7; }
    .nagi { background: #a8e063; }
    .kousuke { background: #9c27b0; color: #fff; }

    /* ソートボタン */
    .sort-buttons {
      display: flex;
      gap: 10px;
      padding: 20px;
    }

    .sort-btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #ddd;
      cursor: pointer;
      font-size: 14px;
    }

    .sort-btn.active {
      background: #0d47a1;
      color: #fff;
    }

    /* 動画カード */
    #video-list {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .video-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .video-meta {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }

    /* 登録フォーム（控えめ） */
    .register-link {
      text-align: center;
      padding: 30px 0;
      font-size: 13px;
      color: #777;
    }

    .register-link a {
      color: #777;
      text-decoration: none;
    }

    /* スマホ最適化 */
    @media (max-width: 600px) {
      .sort-buttons {
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>

<body>

  <!-- 黒ヘッダー -->
  <header class="site-header">
    ESPICE 踊ってみた検索
  </header>

  <!-- Pagefind検索フォーム -->
  <div id="search" style="padding: 20px;"></div>

  <!-- 動画検索セクション -->
  <section class="filter-box">
    <h2 class="section-title">■ 動画検索</h2>

    <!-- メンバー絞り込み -->
    <div class="member-filter">
      <label class="member-tag nes">
        <input type="checkbox" value="ネス"> ネス
      </label>

      <label class="member-tag zoma">
        <input type="checkbox" value="ゾマ"> ゾマ
      </label>

      <label class="member-tag toshi">
        <input type="checkbox" value="とぅーし"> とぅーし
      </label>

      <label class="member-tag nagi">
        <input type="checkbox" value="凪"> 凪
      </label>

      <label class="member-tag kousuke">
        <input type="checkbox" value="KOUSUKE"> KOUSUKE
      </label>
    </div>

    <!-- ソートボタン -->
    <div class="sort-buttons">
      <button class="sort-btn active" data-sort="new">新着順</button>
      <button class="sort-btn" data-sort="views">再生数順</button>
    </div>
  </section>

  <!-- 初期動画一覧 -->
  <section id="video-list"></section>

  <!-- 登録フォーム（控えめ） -->
  <footer class="register-link">
    <a href="https://docs.google.com/forms/xxxxxx" target="_blank">
      登録フォームはこちら
    </a>
  </footer>

  <script>
    /* ------------------------------
       pages/*.html を読み込む
       Renderでは /pages/ に置く
    ------------------------------ */
    async function loadVideos() {
      const list = document.getElementById("video-list");

      const maxId = 500;
      const videos = [];

      for (let i = 1; i <= maxId; i++) {
        const id = String(i).padStart(3, "0");
        const url = `/pages/${id}.html`;  // ← Render対応

        try {
          const res = await fetch(url);
          if (!res.ok) continue;

          const text = await res.text();

          const titleMatch = text.match(/<h1>(.*?)<\/h1>/);
          const title = titleMatch ? titleMatch[1] : "タイトル不明";

          const memberMatch = text.match(/メンバー:\s*(.*?)</);
          const member = memberMatch ? memberMatch[1] : "";

          videos.push({ id, title, member, url });

        } catch (e) {}
      }

      return videos;
    }

    /* ------------------------------
       動画カード描画
    ------------------------------ */
    function renderVideos(videos) {
      const list = document.getElementById("video-list");
      list.innerHTML = "";

      videos.forEach(v => {
        const card = document.createElement("div");
        card.className = "video-card";

        card.innerHTML = `
          <div class="video-title">${v.title}</div>
          <div class="video-meta">メンバー：${v.member}</div>
          <div class="video-meta"><a href="${v.url}" target="_blank">動画ページへ</a></div>
        `;

        list.appendChild(card);
      });
    }

    /* ------------------------------
       初期表示＋絞り込み＋ソート
    ------------------------------ */
    async function init() {
      let videos = await loadVideos();

      // 初期表示：新着順
      videos.sort((a, b) => Number(b.id) - Number(a.id));
      renderVideos(videos);

      // メンバー絞り込み
      const checkboxes = document.querySelectorAll(".member-tag input");
      checkboxes.forEach(cb => {
        cb.addEventListener("change", () => {
          const selected = [...checkboxes]
            .filter(c => c.checked)
            .map(c => c.value);

          let filtered = videos;

          if (selected.length > 0) {
            filtered = videos.filter(v => selected.includes(v.member));
          }

          renderVideos(filtered);
        });
      });

      // ソート
      const sortBtns = document.querySelectorAll(".sort-btn");
      sortBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          sortBtns.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          const type = btn.dataset.sort;

          let sorted = [...videos];

          if (type === "new") {
            sorted.sort((a, b) => Number(b.id) - Number(a.id));
          } else if (type === "views") {
            sorted.sort((a, b) => (b.views || 0) - (a.views || 0));
          }

          renderVideos(sorted);
        });
      });
    }

    init();
  </script>

</body>
</html>
