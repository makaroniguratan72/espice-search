<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>ESPICE Search</title>

    <!-- Pagefind UI（絶対パスで読み込む） -->
    <script src="/pagefind/pagefind-ui.js"></script>
    <link href="/pagefind/pagefind-ui.css" rel="stylesheet">

    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 16px;
        background: #fafafa;
      }

      h1 {
        margin-bottom: 12px;
      }

      #search {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 16px;
      }

      .result-card {
        background: #fff;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 14px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        display: flex;
        gap: 12px;
      }

      .thumb {
        width: 120px;
        height: 90px;
        object-fit: cover;
        border-radius: 6px;
      }

      @media (max-width: 600px) {
        .result-card {
          flex-direction: column;
        }
        .thumb {
          width: 100%;
          height: auto;
        }
      }

      .title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 6px;
      }

      .member-tag {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: bold;
        color: #fff;
        margin-right: 4px;
      }

      .member-nes { background-color: #888; }
      .member-zoma { background-color: #ff8800; }
      .member-tooshi { background-color: #66ccff; }
      .member-nagi { background-color: #99cc33; }
      .member-kosuke { background-color: #9933cc; }

      .meta {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }

      .add-link {
        margin-top: 40px;
        text-align: center;
      }
      .add-link a {
        color: #666;
        font-size: 14px;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <h1>ESPICE 踊ってみた検索</h1>

    <input id="search" placeholder="検索…" />

    <div id="results"></div>

    <div class="add-link">
      <a href="add.html">動画を登録する</a>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", async () => {
        const pagefind = await new PagefindUI({
          element: "#results",
          showSubResults: true
        });

        document.querySelector("#search").addEventListener("input", (e) => {
          pagefind.search(e.target.value);
        });

        pagefind.search("");
      });
    </script>
  </body>
</html>
